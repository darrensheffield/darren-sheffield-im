<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="index, follow">
    <meta name="description" content="Contact Darren Sheffield for professional context, app support, or public-profile follow-up.">
    <title>Darren Sheffield | Contact</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f6f7f4;
        --panel: #ffffff;
        --panel-soft: #eef2ed;
        --text: #1f2522;
        --muted: #56615a;
        --line: #d7ddd5;
        --green: #2d7657;
        --gold: #9b742b;
        --steel: #526b7c;
        --shadow: 0 10px 28px rgba(31, 37, 34, 0.08);
        --site-max-width: 1080px;
        --site-line-height: 1.5;
        --radius: 8px;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #101412;
          --panel: #171d1a;
          --panel-soft: #1d2622;
          --text: #edf2ed;
          --muted: #aeb9b1;
          --line: #2c3933;
          --green: #77c49a;
          --gold: #d2ad62;
          --steel: #93b0c1;
          --shadow: 0 10px 28px rgba(0, 0, 0, 0.28);
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        line-height: var(--site-line-height);
        scrollbar-gutter: stable;
      }

      a {
        color: inherit;
      }

      .site {
        max-width: var(--site-max-width);
        margin: 0 auto;
        padding: 28px 20px 42px;
      }

      .masthead {
        align-items: center;
        display: flex;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 42px;
      }

      .brand {
        color: var(--text);
        display: inline-flex;
        align-items: center;
        gap: 0.52rem;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        font-size: 1.16rem;
        font-weight: 680;
        letter-spacing: 0;
        line-height: 1.05;
        text-decoration: none;
        white-space: nowrap;
      }

      .brand::before {
        align-items: center;
        aspect-ratio: 1 / 1;
        background: color-mix(in oklab, var(--green) 16%, var(--panel));
        border: 1px solid color-mix(in oklab, var(--green) 45%, var(--line));
        border-radius: 999px;
        color: color-mix(in oklab, var(--text) 72%, var(--bg));
        content: "DS";
        display: inline-flex;
        flex: none;
        font-size: 0.74rem;
        font-weight: 760;
        height: 1.82rem;
        justify-content: center;
        letter-spacing: 0.04em;
        width: 1.82rem;
      }

      .brand:focus-visible {
        outline: 3px solid rgba(45, 118, 87, 0.35);
        outline-offset: 3px;
      }

      @media (max-width: 560px) {
        .brand {
          font-size: 1.05rem;
        }

        .brand::before {
          font-size: 0.66rem;
          height: 1.6rem;
          width: 1.6rem;
        }
      }

      .nav {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        font-size: 0.92rem;
      }

      .nav a,
      .button {
        border: 1px solid var(--line);
        border-radius: var(--radius);
        text-decoration: none;
      }

      .nav a {
        color: var(--muted);
        padding: 7px 10px;
      }

      .nav a[aria-current="page"],
      .nav a:hover,
      .button:hover {
        border-color: var(--green);
        color: var(--green);
      }

      .eyebrow,
      .section-label {
        color: var(--green);
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.11em;
        margin: 0 0 12px;
        text-transform: uppercase;
      }

      .section-label {
        color: var(--muted);
      }

      h1 {
        font-size: 3rem;
        letter-spacing: 0;
        line-height: 1.05;
        margin: 0 0 18px;
        max-width: 760px;
      }

      h2 {
        font-size: 1.18rem;
        margin: 0 0 8px;
      }

      .lede {
        color: var(--muted);
        margin: 0;
      }

      .lede {
        font-size: 1.1rem;
        max-width: 760px;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin: 24px 0 34px;
      }

      .button {
        align-items: center;
        background: var(--panel);
        color: var(--text);
        display: inline-flex;
        font-weight: 650;
        min-height: 42px;
        padding: 10px 14px;
      }

      button.button {
        cursor: pointer;
        font: inherit;
      }

      .button.primary {
        background: var(--green);
        border-color: var(--green);
        color: #ffffff;
      }

      .social-icon {
        width: 16px;
        height: 16px;
        margin-right: 8px;
        flex: none;
        fill: currentColor;
      }

      @media (prefers-color-scheme: dark) {
        .button.primary {
          color: #101412;
        }
      }

      a:focus-visible,
      .button:focus-visible {
        outline: 3px solid rgba(45, 118, 87, 0.35);
        outline-offset: 3px;
      }

      @media (max-width: 820px) {
        .site {
          padding: 22px 16px 32px;
        }

        h1 {
          font-size: 2.35rem;
        }
      }

      @media (max-width: 560px) {
        .masthead {
          align-items: flex-start;
          flex-direction: column;
        }

        .nav {
          width: 100%;
        }

        .nav a {
          flex: 1 1 calc(50% - 8px);
          text-align: center;
        }

        h1 {
          font-size: 2rem;
        }

        .actions .button {
          justify-content: center;
          width: 100%;
        }
      }
    </style>
    <link rel="stylesheet" href="assets/site-controls.css?v=20260603-5">
    <script src="assets/site-controls.js?v=20260604-1" defer></script>
  </head>
  <body>

        <nav class="nav" aria-label="Primary navigation">

      </section>
    </main>

  </body>
</html>
